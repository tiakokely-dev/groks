<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Groq - Interface Avancée</title>
    <!-- Import du module deep-chat -->
    <script type="module" src="https://unpkg.com/deep-chat-dev@latest/dist/deepChat.bundle.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --border-color: #e5e5e5;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --chat-height: 600px;
        }

        [data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #818cf8;
            --accent-hover: #6366f1;
            --border-color: #404040;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .config-panel {
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .config-panel.hidden {
            display: none;
        }

        .config-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .config-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-secondary);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .chat-container {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        deep-chat {
            border-radius: 10px !important;
            height: var(--chat-height) !important;
            width: 100% !important;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px 15px;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.error {
            background: #ef4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .model-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .config-row {
                flex-direction: column;
            }

            .config-group {
                width: 100%;
            }

            :root {
                --chat-height: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Chat Groq</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" id="themeToggle" title="Changer le thème">
                    🌙 Thème
                </button>
                <button class="btn btn-secondary" id="configToggle" title="Afficher/masquer la configuration">
                    ⚙️ Config
                </button>
                <button class="btn btn-secondary" id="clearChat" title="Effacer la conversation">
                    🗑️ Effacer
                </button>
                <button class="btn btn-primary" id="exportChat" title="Exporter la conversation">
                    📥 Exporter
                </button>
            </div>
        </header>

        <div class="config-panel" id="configPanel">
            <div class="config-row">
                <div class="config-group">
                    <label for="apiKey">Clé API Groq 🔑</label>
                    <input type="password" id="apiKey" placeholder="Collez votre clé API Groq ici">
                    <div class="model-info">Votre clé est stockée localement et n'est jamais envoyée à nos serveurs</div>
                </div>
                <div class="config-group">
                    <label for="modelSelect">Modèle IA 🧠</label>
                    <select id="modelSelect">
                        <optgroup label="Llama (Meta)">
                            <option value="llama-3.1-8b-instant">Llama 3.1 8B (Rapide)</option>
                            <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Polyvalent)</option>
                            <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout</option>
                        </optgroup>
                        <optgroup label="GPT-oss (OpenAI)">
                            <option value="openai/gpt-oss-20b">GPT-oss 20B</option>
                            <option value="openai/gpt-oss-120b">GPT-oss 120B</option>
                        </optgroup>
                        <optgroup label="Qwen">
                            <option value="qwen/qwen3-32b">Qwen3 32B</option>
                        </optgroup>
                        <optgroup label="Whisper (Audio)">
                            <option value="whisper-large-v3">Whisper Large v3</option>
                            <option value="whisper-large-v3-turbo">Whisper Turbo</option>
                        </optgroup>
                        <optgroup label="Autres">
                            <option value="allam-2-7b">Allam 2 7B</option>
                            <option value="groq/compound">Groq Compound</option>
                            <option value="groq/compound-mini">Groq Compound Mini</option>
                        </optgroup>
                    </select>
                    <div class="model-info" id="modelLimits">RPM: 30 | TPM: 6K</div>
                </div>
                <div class="config-group" style="flex: 0;">
                    <button class="btn btn-primary" id="saveConfig" style="width: 100%;">
                        💾 Sauvegarder
                    </button>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <deep-chat
                id="deepChat"
                style="border-radius: 10px; height: var(--chat-height); width: 100%;">
            </deep-chat>
            <div class="status-bar">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Prêt à chatter</span>
                </div>
                <div id="tokenCount">Messages: 0</div>
            </div>
        </div>
    </div>

    <script>
        // Gestion du thème
        const themeToggle = document.getElementById('themeToggle');
        const configToggle = document.getElementById('configToggle');
        const configPanel = document.getElementById('configPanel');
        const apiKeyInput = document.getElementById('apiKey');
        const modelSelect = document.getElementById('modelSelect');
        const saveConfigBtn = document.getElementById('saveConfig');
        const clearChatBtn = document.getElementById('clearChat');
        const exportChatBtn = document.getElementById('exportChat');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const tokenCount = document.getElementById('tokenCount');
        const modelLimits = document.getElementById('modelLimits');

        // Limites par modèle
        const modelLimitsData = {
            'llama-3.1-8b-instant': 'RPM: 30 | TPM: 6K',
            'llama-3.3-70b-versatile': 'RPM: 30 | TPM: 12K',
            'meta-llama/llama-4-scout-17b-16e-instruct': 'RPM: 30 | TPM: 30K',
            'openai/gpt-oss-20b': 'RPM: 30 | TPM: 8K',
            'openai/gpt-oss-120b': 'RPM: 30 | TPM: 8K',
            'qwen/qwen3-32b': 'RPM: 60 | TPM: 6K',
            'whisper-large-v3': 'RPM: 20',
            'whisper-large-v3-turbo': 'RPM: 20',
            'allam-2-7b': 'RPM: 30 | TPM: 6K',
            'groq/compound': 'RPM: 30 | TPM: 70K',
            'groq/compound-mini': 'RPM: 30 | TPM: 70K'
        };

        // Charger les préférences sauvegardées
        function loadPreferences() {
            const savedApiKey = localStorage.getItem('groq_api_key');
            const savedModel = localStorage.getItem('groq_model');
            const savedTheme = localStorage.getItem('theme') || 'light';

            if (savedApiKey) {
                apiKeyInput.value = savedApiKey;
            }

            if (savedModel) {
                modelSelect.value = savedModel;
            }

            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.textContent = '☀️ Thème';
            }

            updateModelLimits();
        }

        // Sauvegarder la configuration
        function saveConfiguration() {
            const apiKey = apiKeyInput.value.trim();
            const model = modelSelect.value;

            if (!apiKey) {
                showStatus('⚠️ Veuillez entrer une clé API', true);
                return;
            }

            localStorage.setItem('groq_api_key', apiKey);
            localStorage.setItem('groq_model', model);

            initializeChat(apiKey, model);
            showStatus('✅ Configuration sauvegardée !');
        }

        // Initialiser le chat
        function initializeChat(apiKey, model) {
            const deepChat = document.getElementById('deepChat');

            deepChat.directConnection = {
                groq: {
                    key: apiKey,
                    model: model
                }
            };

            // Réinitialiser le chat
            deepChat.clearMessages();

            showStatus('✅ Connecté avec ' + model);
            statusDot.classList.remove('error');
        }

        // Mettre à jour les limites du modèle
        function updateModelLimits() {
            const model = modelSelect.value;
            modelLimits.textContent = modelLimitsData[model] || 'Limites inconnues';
        }

        // Afficher le statut
        function showStatus(message, isError = false) {
            statusText.textContent = message;
            if (isError) {
                statusDot.classList.add('error');
            } else {
                statusDot.classList.remove('error');
            }
        }

        // Compter les messages
        function updateMessageCount() {
            const deepChat = document.getElementById('deepChat');
            // Note: deep-chat ne fournit pas d'API directe pour compter les messages
            // Cette fonctionnalité pourrait être améliorée avec une intégration plus poussée
        }

        // Effacer le chat
        function clearChat() {
            const deepChat = document.getElementById('deepChat');
            if (confirm('Voulez-vous vraiment effacer toute la conversation ?')) {
                deepChat.clearMessages();
                showStatus('🗑️ Conversation effacée');
            }
        }

        // Exporter la conversation
        function exportChat() {
            const deepChat = document.getElementById('deepChat');
            // Récupérer l'historique (nécessiterait une API deep-chat complète)
            alert('Fonctionnalité d\'export en cours d\'amélioration');
        }

        // Toggle du thème
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '☀️ Thème' : '🌙 Thème';
        });

        // Toggle du panneau de configuration
        configToggle.addEventListener('click', () => {
            configPanel.classList.toggle('hidden');
        });

        // Sauvegarder la configuration
        saveConfigBtn.addEventListener('click', saveConfiguration);

        // Effacer le chat
        clearChatBtn.addEventListener('click', clearChat);

        // Exporter le chat
        exportChatBtn.addEventListener('click', exportChat);

        // Changer de modèle
        modelSelect.addEventListener('change', () => {
            updateModelLimits();
            const apiKey = localStorage.getItem('groq_api_key');
            if (apiKey) {
                initializeChat(apiKey, modelSelect.value);
            }
        });

        // Initialisation au chargement
        window.addEventListener('DOMContentLoaded', () => {
            loadPreferences();

            const savedApiKey = localStorage.getItem('groq_api_key');
            const savedModel = localStorage.getItem('groq_model') || 'llama-3.1-8b-instant';

            if (savedApiKey) {
                initializeChat(savedApiKey, savedModel);
            } else {
                showStatus('⚠️ Veuillez configurer votre clé API', true);
            }
        });

        // Raccourcis clavier
        document.addEventListener('keydown', (e) => {
            // Ctrl+S pour sauvegarder
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveConfiguration();
            }
            // Ctrl+E pour exporter
            if (e.ctrlKey && e.key === 'e') {
                e.preventDefault();
                exportChat();
            }
        });
    </script>
</body>
</html>
